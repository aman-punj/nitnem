name: Flutter Android CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Build APK
        run: flutter build apk --release

      - name: Verify APK exists
        run: |
          if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK file not found!"
            exit 1
          fi
          ls -la build/app/outputs/flutter-apk/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: ./apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./apk/app-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            🚀 **Nitnem App Release ${{ github.ref_name }}**
            
            📱 **What's New:**
            - Latest features and improvements
            - Bug fixes and performance enhancements
            
            📥 **Download:** Click on `app-release.apk` below to download
            
            **Installation:** Enable "Install from Unknown Sources" in your device settings before installing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download APK artifact
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: ./apk
        continue-on-error: true
        id: download_artifact

      - name: Set up Python
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Create Drive upload script
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        run: |
          cat > drive_upload.py << 'EOF'
          import os
          import json
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.auth.transport.requests import Request
          
          def upload_to_drive(apk_path, file_name):
              try:
                  # Get credentials from environment
                  creds_json = os.environ.get('GOOGLE_DRIVE_CREDENTIALS')
                  if not creds_json:
                      raise Exception("GOOGLE_DRIVE_CREDENTIALS not found")
          
                  creds_data = json.loads(creds_json)
                  creds = Credentials.from_authorized_user_info(creds_data)
          
                  # Refresh token if needed
                  if creds.expired and creds.refresh_token:
                      creds.refresh(Request())
          
                  # Build Drive service
                  service = build('drive', 'v3', credentials=creds)
          
                  # File metadata
                  file_metadata = {
                      'name': file_name,
                      'parents': [os.environ.get('GOOGLE_DRIVE_FOLDER_ID', 'root')]
                  }
          
                  # Upload file
                  media = MediaFileUpload(apk_path, mimetype='application/vnd.android.package-archive')
                  file = service.files().create(
                      body=file_metadata,
                      media_body=media,
                      fields='id,webViewLink,webContentLink'
                  ).execute()
          
                  # Make file publicly accessible
                  service.permissions().create(
                      fileId=file['id'],
                      body={'role': 'reader', 'type': 'anyone'}
                  ).execute()
          
                  # Get direct download link
                  download_link = f"https://drive.google.com/uc?export=download&id={file['id']}"
                  alt_download_link = f"https://drive.google.com/file/d/{file['id']}/view?usp=sharing"
          
                  return {
                      'success': True,
                      'file_id': file['id'],
                      'view_link': file['webViewLink'],
                      'download_link': download_link,
                      'alt_download_link': alt_download_link
                  }
          
              except Exception as e:
                  return {
                      'success': False,
                      'error': str(e)
                  }
          
          if __name__ == "__main__":
              apk_path = "./apk/app-release.apk"
              branch_name = os.environ.get('GITHUB_REF_NAME', 'unknown')
              commit_sha = os.environ.get('GITHUB_SHA', 'unknown')[:7]
              file_name = f"Nitnem-{branch_name}-{commit_sha}.apk"
          
              result = upload_to_drive(apk_path, file_name)
              print(json.dumps(result))
          EOF

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send Success Notification
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Set variables
          BRANCH_NAME="${GITHUB_REF##*/}"
          APP_NAME="Nitnem"
          APK_PATH="./apk/app-release.apk"
          COMMIT_SHA="${GITHUB_SHA:0:7}"
          
          # Check if APK exists
          if [ ! -f "$APK_PATH" ]; then
            echo "APK file not found at $APK_PATH"
            exit 1
          fi
          
          echo "📤 Uploading APK to Google Drive..."
          
          # Upload to Drive
          UPLOAD_RESULT=$(python drive_upload.py)
          echo "Upload result: $UPLOAD_RESULT"
          
          # Parse result
          SUCCESS=$(echo "$UPLOAD_RESULT" | jq -r '.success' 2>/dev/null || echo "false")
          
          if [ "$SUCCESS" == "true" ]; then
            # Extract links
            DOWNLOAD_LINK=$(echo "$UPLOAD_RESULT" | jq -r '.download_link')
            VIEW_LINK=$(echo "$UPLOAD_RESULT" | jq -r '.view_link')
            ALT_DOWNLOAD_LINK=$(echo "$UPLOAD_RESULT" | jq -r '.alt_download_link')
          
            # Create success message
            cat > message.txt << EOF
          ✅ *Flutter Build Successful* 🎉

          📱 *App:* $APP_NAME
          🌿 *Branch:* $BRANCH_NAME
          🔗 *Commit:* $COMMIT_SHA
          ☁️ *Storage:* Google Drive

          [📥 Direct Download]($DOWNLOAD_LINK)
          [👁️ View & Download]($VIEW_LINK)
          [🔗 Alternative Link]($ALT_DOWNLOAD_LINK)

          ⚠️ *Note:* Enable "Unknown Sources" before installing
          EOF
          
            # Send message
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$(cat message.txt)" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview="false"
          
            # Send APK as document if small enough (Telegram limit: 50MB)
            APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null || echo "0")
            if [ "$APK_SIZE" -lt 52428800 ] && [ "$APK_SIZE" -gt 0 ]; then
              echo "📤 Sending APK as Telegram document..."
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@$APK_PATH" \
                -F caption="🎯 Direct APK file for $APP_NAME ($BRANCH_NAME - $COMMIT_SHA)"
            fi
          else
            # Drive upload failed
            ERROR_MSG=$(echo "$UPLOAD_RESULT" | jq -r '.error' 2>/dev/null || echo "Unknown error")
          
            cat > message.txt << EOF
          ⚠️ *Build Successful but Drive Upload Failed* 📤

          📱 *App:* $APP_NAME
          🌿 *Branch:* $BRANCH_NAME
          🔗 *Commit:* $COMMIT_SHA

          ❌ Drive upload error: $ERROR_MSG
          💡 [Check GitHub Actions](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          EOF
          
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$(cat message.txt)" \
              -d parse_mode="Markdown"
          fi

      - name: Send Failure Notification
        if: needs.build.result != 'success' || (needs.build.result == 'success' && steps.download_artifact.outcome != 'success')
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Set variables
          BRANCH_NAME="${GITHUB_REF##*/}"
          APP_NAME="Nitnem"
          COMMIT_SHA="${GITHUB_SHA:0:7}"
          
          if [ "${{ needs.build.result }}" != "success" ]; then
            # Build failed
            cat > message.txt << EOF
          ❌ *Flutter Build Failed* 💥

          📱 *App:* $APP_NAME
          🌿 *Branch:* $BRANCH_NAME
          🔗 *Commit:* $COMMIT_SHA

          🔍 [View Logs](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          EOF
          else
            # Build succeeded but artifact issues
            cat > message.txt << EOF
          ⚠️ *Build Successful but APK Access Issues* 📤

          📱 *App:* $APP_NAME
          🌿 *Branch:* $BRANCH_NAME
          🔗 *Commit:* $COMMIT_SHA

          ❌ Could not access APK artifact
          💡 [Download from GitHub Actions](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          EOF
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$(cat message.txt)" \
            -d parse_mode="Markdown"
name: Flutter Android CI/CD

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Releases
          path: ./build/app/outputs/flutter-apk/app-release.apk\

      - name:
          if: success()  # This step will only run if the build is successful
          uses: peter-evans/send-mail@v1
          with:
            from: 'apsingh.amanpreet@gmail.com'
            to: 'bottomfragerxo@gmail.com'
            subject: 'Flutter Build Successful'
            body: 'Hello, the Flutter APK build was successful. You can download the build artifact from GitHub Actions.'
name: Firebase App Distribution

on:
push:
branches:
- main

workflow_dispatch:
inputs:
testers:
description: "Tester groups (comma separated)"
required: false
default: "dev, testers"

jobs:
build-android:
name: Build & Distribute Android
runs-on: ubuntu-latest
 
defaults:
  run:
    working-directory: mobile_app

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: 3.35.7
      channel: stable
      cache: true

  - name: Cache pub packages
    uses: actions/cache@v4
    with:
      path: ~/.pub-cache
      key: ${{ runner.os }}-pub-${{ hashFiles('mobile_app/pubspec.lock') }}
      restore-keys: |
        ${{ runner.os }}-pub-

  - name: Decode Android Keystore
    run: |
      echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

  - name: Create key.properties
    run: |
      echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
      echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
      echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
      echo "storeFile=app/upload-keystore.jks" >> android/key.properties

  - name: Get dependencies
    run: flutter pub get

  # Optional
  # - name: Run analyzer
  #   run: flutter analyze

  # - name: Run tests
  #   run: flutter test

  - name: Build Android APK
    run: flutter build apk --release

  - name: Install Firebase CLI
    run: npm install -g firebase-tools

  - name: Upload to Firebase App Distribution
    run: |
      firebase appdistribution:distribute \
      build/app/outputs/flutter-apk/app-release.apk \
      --app "${{ secrets.FIREBASE_APP_ID_ANDROID }}" \
      --groups "${{ github.event.inputs.testers || 'dev' }}" \
      --release-notes "${{ github.event.inputs.release_notes || 'Automated build from GitHub Actions' }}"
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

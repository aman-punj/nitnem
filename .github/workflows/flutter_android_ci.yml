name: Flutter Android CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Verify APK exists
        run: |
          if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK file not found!"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download APK artifact
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: ./apk
        continue-on-error: true
        id: download_artifact

      - name: Set up Python
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        run: pip install google-api-python-client google-auth

      - name: Upload to Google Drive
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success'
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          cat > drive_upload.py << 'EOF'
          import os
          import json
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          
          creds = Credentials.from_authorized_user_info(
              json.loads(os.environ['GOOGLE_DRIVE_CREDENTIALS'])
          )
          
          service = build('drive', 'v3', credentials=creds)
          
          file_metadata = {
              'name': f"Nitnem-{os.environ['GITHUB_REF_NAME']}-{os.environ['GITHUB_SHA'][:7]}.apk",
              'parents': [os.environ.get('GOOGLE_DRIVE_FOLDER_ID', 'root')]
          }
          
          media = MediaFileUpload('./apk/app-release.apk', 
                                 mimetype='application/vnd.android.package-archive')
          
          file = service.files().create(
              body=file_metadata,
              media_body=media,
              fields='id'
          ).execute()
          
          # Make file publicly accessible
          service.permissions().create(
              fileId=file['id'],
              body={'role': 'reader', 'type': 'anyone'}
          ).execute()
          
          print(file['id'])
          EOF
          
          FILE_ID=$(python drive_upload.py)
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

      - name: Send Success Notification
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success' && env.FILE_ID != ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="✅ <b>Build Successful</b>
          
          📱 App: Nitnem
          🌿 Branch: ${GITHUB_REF##*/}
          🔗 Commit: ${GITHUB_SHA:0:7}
          
          📥 Download: <a href='https://drive.google.com/uc?export=download&id=${{ env.FILE_ID }}'>APK</a>
          🔗 File ID: <code>${{ env.FILE_ID }}</code>
          
          ⚠️ Enable 'Unknown Sources' to install"

      - name: Send Upload Failure Notification
        if: needs.build.result == 'success' && steps.download_artifact.outcome == 'success' && env.FILE_ID == ''
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="⚠️ <b>Build Successful but Drive Upload Failed</b>
          
            🔗 Download from GitHub Actions:
            https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Send Build Failure Notification
        if: needs.build.result == 'failure'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Build Failed</b>
          
            🔍 View logs:
            https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
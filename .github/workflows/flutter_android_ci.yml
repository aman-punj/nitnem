name: Firebase App Distribution

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      testers:
        description: "Dev (comma separated)"
        required: false
        default: "dev"

      release_notes:
        description: "Release notes"
        required: false
        default: "Manual build from GitHub Actions"

jobs:
  build-android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      # Optional - remove if tests aren't ready yet
      - name: Run tests
        run: flutter test

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute \
          build/app/outputs/bundle/release/app-release.aab \
          --app "${{ secrets.FIREBASE_APP_ID_ANDROID }}" \
          --groups "${{ github.event.inputs.testers || 'testers' }}" \
          --release-notes "${{ github.event.inputs.release_notes || 'Automated build from GitHub Actions' }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
name: Flutter Android CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: ./apk

      - name: Install curl and coreutils
        run: sudo apt-get update && sudo apt-get install -y curl coreutils

      - name: Send Telegram Notification via transfer.sh
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BRANCH_NAME="${GITHUB_REF##*/}"
          APP_NAME="Nitnem"
          APK_PATH="./apk/app-release.apk"

          
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "Uploading APK to file.io..."

            APK_LINK=$(curl -s -F "file=@$APK_PATH" https://file.io | jq -r '.link')
          
            MESSAGE="✅ Flutter Build succeeded for *$APP_NAME* on branch *$BRANCH_NAME*.\n\n[📥 Download APK]($APK_LINK)"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$MESSAGE" \
              -d parse_mode="Markdown"
          else
            MESSAGE="❌ Flutter Build failed for *$APP_NAME* on branch *$BRANCH_NAME*. Please check the logs."
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$MESSAGE" \
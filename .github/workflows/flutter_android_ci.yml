name: Flutter Android CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'latest'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Build APK
        run: flutter build apk --release

      - name: Verify APK exists
        run: |
          if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "APK file not found!"
            exit 1
          fi
          ls -la build/app/outputs/flutter-apk/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: ./apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./apk/app-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            🚀 **Nitnem App Release ${{ github.ref_name }}**
            
            📱 **What's New:**
            - Latest features and improvements
            - Bug fixes and performance enhancements
            
            📥 **Download:** Click on `app-release.apk` below to download
            
            **Installation:** Enable "Install from Unknown Sources" in your device settings before installing.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download APK artifact
        if: needs.build.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: ./apk
        continue-on-error: true
        id: download_artifact

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl

      - name: Upload APK and Send Telegram Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF##*/}"
          APP_NAME="Nitnem"
          APK_PATH="./apk/app-release.apk"
          COMMIT_SHA="${GITHUB_SHA:0:7}"
          
          # Function to upload to 0x0.st
          upload_to_0x0() {
            echo "Trying 0x0.st..."
            RESPONSE=$(curl -s -F "file=@$APK_PATH" https://0x0.st)
            if [[ "$RESPONSE" =~ ^https://0x0\.st/.+ ]]; then
              echo "$RESPONSE"
              return 0
            fi
            return 1
          }
          
          # Function to upload to transfer.sh
          upload_to_transfer() {
            echo "Trying transfer.sh..."
            RESPONSE=$(curl -s --upload-file "$APK_PATH" "https://transfer.sh/app-release.apk")
            if [[ "$RESPONSE" =~ ^https://transfer\.sh/.+ ]]; then
              echo "$RESPONSE"
              return 0
            fi
            return 1
          }
          
          # Function to upload to temp.sh
          upload_to_temp() {
            echo "Trying temp.sh..."
            RESPONSE=$(curl -s -F "file=@$APK_PATH" https://temp.sh/upload)
            LINK=$(echo "$RESPONSE" | jq -r '.url' 2>/dev/null)
            if [[ "$LINK" != "null" && "$LINK" != "" ]]; then
              echo "$LINK"
              return 0
            fi
            return 1
          }
          
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ steps.download_artifact.outcome }}" == "success" ] && [ -f "$APK_PATH" ]; then
            echo "📤 Uploading APK to multiple services..."
          
            # Try upload services in order
            APK_LINK=""
            UPLOAD_SERVICE=""
          
            if APK_LINK=$(upload_to_0x0); then
              UPLOAD_SERVICE="0x0.st"
            elif APK_LINK=$(upload_to_transfer); then
              UPLOAD_SERVICE="transfer.sh"
            elif APK_LINK=$(upload_to_temp); then
              UPLOAD_SERVICE="temp.sh"
            fi
          
            # Prepare Telegram message
            if [[ "$APK_LINK" != "" ]]; then
              MESSAGE=$'✅ *Flutter Build Successful* 🎉\n\n'
              MESSAGE+=$'📱 *App:* '"$APP_NAME"$'\n'
              MESSAGE+=$'🌿 *Branch:* '"$BRANCH_NAME"$'\n'
              MESSAGE+=$'🔗 *Commit:* '"$COMMIT_SHA"$'\n'
              MESSAGE+=$'☁️ *Service:* '"$UPLOAD_SERVICE"$'\n\n'
              MESSAGE+=$'[📥 Download APK]('"$APK_LINK"$')\n\n'
              MESSAGE+=$'⚠️ *Note:* Enable "Unknown Sources" before installing'
          
              # Send message with download link
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                -d text="$MESSAGE" \
                -d parse_mode="Markdown" \
                -d disable_web_page_preview="false"
          
              # Also send APK as document (Telegram allows up to 50MB)
              APK_SIZE=$(stat -f%z "$APK_PATH" 2>/dev/null || stat -c%s "$APK_PATH")
              if [ "$APK_SIZE" -lt 52428800 ]; then
                echo "📤 Sending APK as Telegram document..."
                curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument" \
                  -F chat_id="${TELEGRAM_CHAT_ID}" \
                  -F document="@$APK_PATH" \
                  -F caption="🎯 Direct APK file for $APP_NAME ($BRANCH_NAME - $COMMIT_SHA)"
              fi
          
            else
              MESSAGE=$'⚠️ *Build Successful but Upload Failed* 📤\n\n'
              MESSAGE+=$'📱 *App:* '"$APP_NAME"$'\n'
              MESSAGE+=$'🌿 *Branch:* '"$BRANCH_NAME"$'\n'
              MESSAGE+=$'🔗 *Commit:* '"$COMMIT_SHA"$'\n\n'
              MESSAGE+=$'❌ All upload services failed\n'
              MESSAGE+=$'💡 [Check GitHub Actions](https://github.com/'"$GITHUB_REPOSITORY"'/actions/runs/'"$GITHUB_RUN_ID"$')'
          
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                -d text="$MESSAGE" \
                -d parse_mode="Markdown"
            fi
          
          elif [ "${{ needs.build.result }}" == "success" ]; then
            # Build succeeded but artifact issues
            MESSAGE=$'⚠️ *Build Successful but APK Upload Issues* 📤\n\n'
            MESSAGE+=$'📱 *App:* '"$APP_NAME"$'\n'
            MESSAGE+=$'🌿 *Branch:* '"$BRANCH_NAME"$'\n'
            MESSAGE+=$'🔗 *Commit:* '"$COMMIT_SHA"$'\n\n'
            MESSAGE+=$'❌ Could not access APK artifact\n'
            MESSAGE+=$'💡 [Download from GitHub Actions](https://github.com/'"$GITHUB_REPOSITORY"'/actions/runs/'"$GITHUB_RUN_ID"$')'
          
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$MESSAGE" \
              -d parse_mode="Markdown"
          
          else
            # Build failed
            MESSAGE=$'❌ *Flutter Build Failed* 💥\n\n'
            MESSAGE+=$'📱 *App:* '"$APP_NAME"$'\n'
            MESSAGE+=$'🌿 *Branch:* '"$BRANCH_NAME"$'\n'
            MESSAGE+=$'🔗 *Commit:* '"$COMMIT_SHA"$'\n\n'
            MESSAGE+=$'🔍 [View Logs](https://github.com/'"$GITHUB_REPOSITORY"'/actions/runs/'"$GITHUB_RUN_ID"$')'
          
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="$MESSAGE" \
              -d parse_mode="Markdown"
          fi
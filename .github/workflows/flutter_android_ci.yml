name: Flutter Android CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Java
        uses: actions/setup-java@v3.12.0
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Releases
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Send success mail
        if: success()
        uses: peter-evans/send-mail@v1
        with:
          from: 'apsingh.amanpreet@gmail.com'
          to: 'bottomfragerxo@gmail.com'
          subject: '✅ Flutter Build Successful'
          body: 'Hello,\n\nThe Flutter APK build was successful. You can download it from GitHub Actions artifacts.\n\n- GitHub Actions'

      - name: Send failure mail
        if: failure()
        uses: peter-evans/send-mail@v1
        with:
          from: 'apsingh.amanpreet@gmail.com'
          to: 'bottomfragerxo@gmail.com'
          subject: '❌ Flutter Build Failed'
          body: 'Hello,\n\nThe Flutter APK build has failed. Please check the GitHub Actions logs to debug the issue.\n\n- GitHub Actions'

name: nitnem
description: "A new Flutter project." 
publish_to: 'none'  

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.4
  get: ^4.7.2
  firebase_core: ^4.6.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0
  package_info_plus: ^9.0.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/texts/en/
    - assets/texts/hi/
    - assets/texts/pn/
    - assets/audios/
    - assets/images/
